<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIE11 · space community</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0b0510;
      color: white;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== PURE CSS SPACE BACKGROUND (24/7) ===== */
    .space-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -10;
      background: radial-gradient(ellipse at 40% 40%, #1a0033, #000000 80%);
    }

    .stars-small, .stars-medium, .stars-large {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .stars-small {
      box-shadow: 1245px 832px 0 0 rgba(255,255,255,0.6),
                  357px 1238px 0 0 rgba(255,255,255,0.5),
                  1892px 210px 0 0 rgba(255,255,240,0.7),
                  78px 645px 0 0 rgba(255,255,255,0.4),
                  1567px 998px 0 0 rgba(255,255,240,0.6),
                  2345px 1456px 0 0 rgba(255,255,255,0.3),
                  102px 1890px 0 0 rgba(255,255,240,0.5),
                  2010px 500px 0 0 rgba(255,255,200,0.7),
                  750px 1700px 0 0 rgba(255,255,255,0.4),
                  1300px 2200px 0 0 rgba(255,255,240,0.6),
                  300px 2400px 0 0 rgba(255,240,255,0.5),
                  2500px 800px 0 0 rgba(255,255,210,0.4),
                  1100px 1300px 0 0 rgba(255,255,240,0.8),
                  1800px 1900px 0 0 rgba(255,255,255,0.3),
                  400px 400px 0 0 rgba(255,255,240,0.7),
                  2200px 300px 0 0 rgba(255,255,255,0.5),
                  900px 2100px 0 0 rgba(240,240,255,0.4);
      animation: drift 200s linear infinite;
    }

    .stars-medium {
      box-shadow: 350px 820px 0 1px rgba(255,200,255,0.8),
                  1450px 320px 0 1px rgba(210,180,255,0.9),
                  780px 1480px 0 2px rgba(200,160,255,0.7),
                  1990px 650px 0 1px rgba(255,210,255,0.8),
                  500px 1900px 0 2px rgba(230,190,255,0.6),
                  2300px 1100px 0 1px rgba(240,200,255,0.9),
                  1200px 2200px 0 1px rgba(255,220,255,0.7),
                  270px 1500px 0 2px rgba(180,130,255,0.5),
                  1850px 1700px 0 1px rgba(200,150,255,0.8),
                  600px 600px 0 2px rgba(255,210,255,0.9);
      animation: drift 150s linear infinite reverse;
    }

    .stars-large {
      box-shadow: 120px 320px 0 3px rgba(255,255,255,1),
                  870px 1250px 0 4px rgba(255,210,255,1),
                  1620px 880px 0 3px rgba(200,180,255,1),
                  420px 1820px 0 5px rgba(255,240,200,1),
                  2010px 400px 0 4px rgba(220,170,255,1),
                  1300px 1500px 0 3px rgba(255,255,200,1),
                  550px 2200px 0 4px rgba(210,160,255,1),
                  2450px 700px 0 3px rgba(255,220,255,1),
                  900px 300px 0 5px rgba(240,190,255,1);
      animation: twinkle 4s infinite alternate, drift 300s linear infinite;
    }

    .nebula {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
          radial-gradient(circle at 20% 30%, rgba(150, 0, 255, 0.25) 0%, transparent 30%),
          radial-gradient(circle at 80% 70%, rgba(90, 0, 180, 0.25) 0%, transparent 35%),
          radial-gradient(circle at 40% 80%, rgba(200, 100, 255, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 70% 20%, rgba(120, 20, 200, 0.2) 0%, transparent 30%);
      filter: blur(30px);
      mix-blend-mode: screen;
      animation: nebulaPulse 20s infinite alternate;
    }

    .shooting-stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .shooting-star {
      position: absolute;
      left: -10%;
      top: 20%;
      width: 150px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,1), rgba(200,160,255,0));
      border-radius: 50%;
      filter: drop-shadow(0 0 8px #c08aff);
      opacity: 0;
      transform: rotate(20deg);
      animation: shoot 8s linear infinite;
    }

    .shooting-star:nth-child(2) {
      top: 60%;
      left: -5%;
      animation-delay: 3s;
      width: 200px;
    }
    .shooting-star:nth-child(3) {
      top: 80%;
      left: -15%;
      animation-delay: 5.5s;
      width: 120px;
    }
    .shooting-star:nth-child(4) {
      top: 30%;
      left: -20%;
      animation-delay: 1.2s;
      width: 180px;
    }
    .shooting-star:nth-child(5) {
      top: 45%;
      left: -8%;
      animation-delay: 7.3s;
      width: 220px;
    }

    @keyframes drift {
      0% { transform: translateY(0) translateX(0); }
      100% { transform: translateY(-1000px) translateX(300px); }
    }

    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    @keyframes nebulaPulse {
      0% { opacity: 0.3; filter: blur(30px); }
      100% { opacity: 0.8; filter: blur(40px); }
    }

    @keyframes shoot {
      0% {
        transform: translateX(0) translateY(0) rotate(20deg);
        opacity: 1;
      }
      70% {
        opacity: 1;
      }
      100% {
        transform: translateX(120vw) translateY(30vh) rotate(20deg);
        opacity: 0;
      }
    }

    /* ===== 75% SCALE DARK PURPLE UI ===== */
    .container {
      max-width: 975px;
      margin: 0 auto;
      padding: 1.5rem 1.125rem;
      position: relative;
      z-index: 2;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.875rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(200, 100, 255, 0.5);
    }

    .logo h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.25rem;
      font-weight: 800;
      background: linear-gradient(145deg, #fff, #e8d0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 11.25px #c08aff, 0 0 22.5px #a020f0;
      letter-spacing: 2.25px;
    }

    .logo small {
      font-size: 0.675rem;
      display: block;
      color: #d8b5ff;
      letter-spacing: 1.5px;
    }

    .nav-links {
      display: flex;
      gap: 0.375rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: rgba(30, 10, 50, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid #b87cff;
      color: white;
      padding: 0.525rem 1.35rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 7.5px #9b4dff;
      font-family: 'Orbitron', sans-serif;
    }

    .nav-btn:hover {
      background: #9b4dff;
      border-color: white;
      box-shadow: 0 0 15px #d5a2ff;
      transform: scale(1.05);
    }

    .nav-btn.active {
      background: #aa66ff;
      border-color: white;
      box-shadow: 0 0 15px #e5b2ff;
    }

    .login-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .discord-login {
      background: #5865F2;
      border: none;
      color: white;
      padding: 0.525rem 1.35rem;
      border-radius: 30px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #b87cff;
      box-shadow: 0 0 11.25px #8a5be6;
    }

    .discord-login:hover {
      background: #4752c4;
      box-shadow: 0 0 18.75px #b280ff;
    }

    .user-badge {
      background: rgba(128, 0, 255, 0.3);
      border: 1px solid #c68eff;
      border-radius: 30px;
      padding: 0.3rem 0.9rem;
      font-size: 0.675rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      backdrop-filter: blur(4px);
    }

    .role-tag {
      background: #aa66ff;
      padding: 0.15rem 0.6rem;
      border-radius: 15px;
      font-size: 0.525rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .page-card {
      background: rgba(15, 5, 25, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(200, 100, 255, 0.5);
      border-radius: 2.25rem;
      padding: 1.875rem 1.5rem;
      box-shadow: 0 15px 30px rgba(0,0,0,0.8), 0 0 30px #b266ff;
      margin-top: 1.5rem;
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 1.35rem;
      color: white;
      text-shadow: 0 0 6px #d9b0ff;
      border-left: 4.5px solid #c580ff;
      padding-left: 1.125rem;
    }

    /* social boxes (used on Discord & Kick page) */
    .social-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin: 2.25rem 0;
      justify-content: center;
    }

    .social-box {
      flex: 1 1 210px;
      background: rgba(90, 20, 150, 0.5);
      backdrop-filter: blur(8px);
      border: 1.5px solid #c68eff;
      border-radius: 1.875rem;
      padding: 1.875rem 1.125rem;
      text-align: center;
      transition: 0.2s;
      cursor: pointer;
      box-shadow: 0 0 18.75px #b266ff;
    }

    .social-box:hover {
      transform: scale(1.05);
      border-color: white;
      box-shadow: 0 0 33.75px #e5b2ff;
    }

    .social-box i {
      font-size: 3rem;
      margin-bottom: 0.75rem;
      filter: drop-shadow(0 0 7.5px #c97fff);
    }

    .social-box .fa-discord {
      background: linear-gradient(145deg, #ffffff, #d9b0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .social-box .fa-kickstarter {
      color: #00ff88;
      filter: drop-shadow(0 0 7.5px #00ffaa);
    }

    .social-box h3 {
      font-size: 1.35rem;
      font-weight: 600;
    }

    /* jackpotter button (big) */
    .jackpotter-box {
      text-align: center;
      margin: 3rem 0;
    }

    .btn-jackpotter {
      background: #8a2be2;
      border: none;
      padding: 1.5rem 3rem;
      border-radius: 60px;
      font-size: 2rem;
      font-weight: 800;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 0 30px #b87cff;
      transition: 0.2s;
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
    }

    .btn-jackpotter:hover {
      background: #9f4eff;
      box-shadow: 0 0 50px #d5a0ff;
      transform: scale(1.05);
    }

    .btn-jackpotter i {
      font-size: 2.5rem;
    }

    /* winners table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 0.75rem 0.375rem;
      border-bottom: 1.5px solid #c580ff;
      color: #e5c3ff;
    }

    td {
      padding: 0.6rem 0.375rem;
      border-bottom: 1px solid rgba(200, 100, 255, 0.4);
    }

    /* admin panel (simplified) */
    .admin-card {
      background: #1a0b2a;
      border: 1px solid #c68eff;
      border-radius: 1.5rem;
      padding: 1.35rem;
      max-width: 400px;
      margin: 0 auto;
    }

    .admin-card h3 {
      font-size: 1.35rem;
      margin-bottom: 0.9rem;
      color: #ebd0ff;
    }

    input, button {
      background: rgba(30, 10, 45, 0.9);
      border: 1px solid #c68eff;
      color: white;
      padding: 0.6rem 0.9rem;
      border-radius: 22.5px;
      font-size: 0.75rem;
      margin: 0.225rem 0;
      width: 100%;
    }

    button {
      background: #8a2be2;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      width: auto;
      margin-right: 0.375rem;
    }

    button:hover {
      background: #b266ff;
    }

    .hidden {
      display: none;
    }

    .footer {
      margin-top: 2.25rem;
      text-align: center;
      color: #c9a6ff;
      font-size: 0.75rem;
    }

    @media (max-width: 700px) {
      .header {
        flex-direction: column;
        align-items: stretch;
      }
      .nav-links {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Pure CSS space background -->
  <div class="space-bg">
    <div class="stars-small"></div>
    <div class="stars-medium"></div>
    <div class="stars-large"></div>
    <div class="nebula"></div>
    <div class="shooting-stars">
      <div class="shooting-star"></div>
      <div class="shooting-star"></div>
      <div class="shooting-star"></div>
      <div class="shooting-star"></div>
      <div class="shooting-star"></div>
    </div>
  </div>

  <div class="container">
    <!-- header -->
    <div class="header">
      <div class="logo">
        <h1>KIE11</h1>
        <small>official community</small>
      </div>
      <div class="nav-links">
        <button class="nav-btn active" data-page="home">HOME</button>
        <button class="nav-btn" data-page="discordkick">DISCORD & KICK</button>
        <button class="nav-btn" data-page="winners">WINNERS</button>
        <button class="nav-btn" data-page="admin">ADMIN</button>
      </div>
      <div class="login-area" id="loginArea">
        <button class="discord-login" id="discordLoginBtn"><i class="fab fa-discord"></i> Login with Discord</button>
        <div id="userInfo" class="user-badge hidden"></div>
      </div>
    </div>

    <!-- main content page -->
    <div class="page-card" id="pageContent">
      <!-- injected by javascript -->
    </div>

    <div class="footer">
      <i class="fas fa-star"></i> KIE11 · where galaxies meet
    </div>
  </div>

  <script>
    (function() {
      // ----- MOCK DATABASE -----
      let currentUser = null;

      let winners = [
        { name: 'Player123', prize: '$200', date: 'Feb 2026' },
        { name: 'AlphaKing', prize: '$50', date: 'Jan 2026' }
      ];

      // ----- DISCORD LOGIN SIMULATION -----
      const loginBtn = document.getElementById('discordLoginBtn');
      const userInfo = document.getElementById('userInfo');

      function updateUserUI() {
        if (currentUser) {
          loginBtn.classList.add('hidden');
          userInfo.classList.remove('hidden');
          userInfo.innerHTML = `<i class="fab fa-discord"></i> ${currentUser.username} <span class="role-tag">${currentUser.role}</span>`;
        } else {
          loginBtn.classList.remove('hidden');
          userInfo.classList.add('hidden');
        }
        renderPage(currentPage);
      }

      loginBtn.addEventListener('click', () => {
        const role = prompt('Mock Discord Login: enter role (Admin, Mod, User)', 'User');
        if (role === null) return;
        let normalizedRole = 'User';
        if (role.toLowerCase() === 'admin') normalizedRole = 'Admin';
        else if (role.toLowerCase() === 'mod' || role.toLowerCase() === 'moderator') normalizedRole = 'Moderator';
        else normalizedRole = 'User';

        currentUser = {
          id: 'discord_' + Math.random().toString(36).substring(2),
          username: normalizedRole + 'User_' + Math.floor(Math.random() * 1000),
          role: normalizedRole
        };
        updateUserUI();
      });

      userInfo.addEventListener('click', () => {
        currentUser = null;
        updateUserUI();
      });

      // ----- PAGE ROUTING -----
      let currentPage = 'home';
      const navBtns = document.querySelectorAll('.nav-btn');
      const pageContent = document.getElementById('pageContent');

      function setActiveNav(page) {
        navBtns.forEach(btn => {
          if (btn.dataset.page === page) btn.classList.add('active');
          else btn.classList.remove('active');
        });
      }

      function renderPage(page) {
        currentPage = page;
        setActiveNav(page);
        if (page === 'home') renderHome();
        else if (page === 'discordkick') renderDiscordKick();
        else if (page === 'winners') renderWinners();
        else if (page === 'admin') renderAdmin();
      }

      navBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          renderPage(btn.dataset.page);
        });
      });

      // ----- PAGE RENDERERS -----
      function renderHome() {
        let html = `
          <h2><i class="fas fa-home"></i> HOME</h2>
          <div class="jackpotter-box">
            <a href="https://jackpotter.com/?modal=sign-up&p=KIEJP" target="_blank" class="btn-jackpotter">
              <i class="fas fa-dice"></i> JOIN JACKPOTTER
            </a>
          </div>
          <p style="text-align: center; color: #d9b0ff; margin-top: 2rem;">The ultimate place to play and win.</p>
        `;
        pageContent.innerHTML = html;
      }

      function renderDiscordKick() {
        let html = `
          <h2><i class="fas fa-hashtag"></i> DISCORD & KICK</h2>
          <div class="social-grid">
            <div class="social-box" onclick="window.open('https://discord.gg/4kcTCk8T','_blank')">
              <i class="fab fa-discord"></i>
              <h3>Join the KIE11 Discord</h3>
            </div>
            <div class="social-box" onclick="window.open('https://kick.com/kie11','_blank')">
              <i class="fab fa-kickstarter"></i>
              <h3>Watch on Kick</h3>
            </div>
          </div>
        `;
        pageContent.innerHTML = html;
      }

      function renderWinners() {
        let rows = winners.map(w => `<tr><td>${w.name}</td><td>${w.prize}</td><td>${w.date}</td></tr>`).join('');
        html = `
          <h2><i class="fas fa-trophy"></i> WINNERS</h2>
          <table>
            <tr><th>Winner Name</th><th>Prize</th><th>Date</th></tr>
            ${rows || '<tr><td colspan="3">No winners yet</td></tr>'}
          </table>
        `;
        pageContent.innerHTML = html;
      }

      function renderAdmin() {
        const isAdmin = currentUser && (currentUser.role === 'Admin' || currentUser.role === 'Moderator');
        if (!isAdmin) {
          pageContent.innerHTML = `<h2>⛔ ACCESS DENIED</h2><p style="font-size:1.5rem;">You need Admin or Moderator role to view this panel.</p>`;
          return;
        }

        let options = winners.map((w, idx) => `<option value="${idx}">${w.name} - ${w.prize}</option>`).join('');

        html = `
          <h2><i class="fas fa-cogs"></i> ADMIN DASHBOARD</h2>
          <div style="display: flex; justify-content: center;">
            <div class="admin-card">
              <h3>🏆 Manage Winners</h3>
              <input type="text" id="winnerName" placeholder="Name">
              <input type="text" id="winnerPrize" placeholder="Prize">
              <input type="text" id="winnerDate" placeholder="Date (e.g. Mar 2026)">
              <button id="addWinnerBtn">Add Winner</button>
              
              <h4 style="margin-top:1rem;">Delete Winner</h4>
              <select id="winnerSelect" size="4" style="width:100%; background:black; margin-bottom:0.5rem;">
                ${options}
              </select>
              <button id="deleteWinnerBtn">Delete Selected</button>
            </div>
          </div>
        `;
        pageContent.innerHTML = html;

        document.getElementById('addWinnerBtn').addEventListener('click', () => {
          const name = document.getElementById('winnerName').value;
          const prize = document.getElementById('winnerPrize').value;
          const date = document.getElementById('winnerDate').value;
          if (name && prize && date) {
            winners.push({ name, prize, date });
            renderAdmin();
          } else alert('Fill all fields');
        });

        document.getElementById('deleteWinnerBtn').addEventListener('click', () => {
          const select = document.getElementById('winnerSelect');
          if (select.selectedIndex === -1) return;
          const idx = parseInt(select.value);
          winners.splice(idx, 1);
          renderAdmin();
        });
      }

      // initial render
      renderPage('home');
    })();
  </script>
</body>
</html>
